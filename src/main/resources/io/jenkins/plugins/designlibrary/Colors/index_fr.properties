do.1=Utilisez de la <span class="jdl-colors-tag">couleur</span> pour attirer l''attention sur des parties importantes de votre interface.
do.2=Il est pr\u00e9f\u00e9rable d''utiliser les couleurs fournies par Jenkins, car elles s''adapteront automatiquement au th\u00e8me de l''utilisateur.
dont.1=La couleur ne doit pas \u00eatre la seule fa\u00e7on de transmettre une information, il faut utiliser du texte ou des symboles en compl\u00e9ment.
