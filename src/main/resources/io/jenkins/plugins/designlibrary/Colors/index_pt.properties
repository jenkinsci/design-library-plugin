do.1=Use <span class="jdl-colors-tag">cor</span> para chamar aten\u00e7\u00e3o para partes importantes da sua interface.
do.2=\u00c9 melhor usar as cores fornecidas pelo Jenkins, pois elas se adaptar\u00e3o automaticamente ao tema do usu\u00e1rio.
dont.1=A cor n\u00e3o deve ser a \u00fanica forma de transmitir uma informa\u00e7\u00e3o, use texto ou s\u00edmbolos junto com ela.
